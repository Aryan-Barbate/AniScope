<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniScope | Anime Discovery Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body oncontextmenu="return false">
    <div class="atmosphere orb-one" aria-hidden="true"></div>
    <div class="atmosphere orb-two" aria-hidden="true"></div>

    <header class="header">
        <div class="brand-block">
            <p class="eyebrow">Anime Discovery Hub</p>
            <h1 class="logo">AniScope</h1>
            <p class="subtitle">Discover hidden gems and legendary classics in one cinematic feed.</p>
        </div>

        <div class="search-container">
            <input
                type="text"
                id="searchInput"
                placeholder="Search anime by title..."
            >
        </div>
    </header>

    <main class="main">
        <section class="toolbar">
            <h2 class="section-title">Discover Anime</h2>

            <div class="filters">
                <select id="genreFilter" aria-label="Filter anime by genre">
                    <option value="all">All Genres</option>
                    <option value="Action">Action</option>
                    <option value="Adventure">Adventure</option>
                    <option value="Sports">Sports</option>
                    <option value="Romance">Romance</option>
                </select>
            </div>

            <div class="meta-panel">
                <span id="sourceBadge" class="source-badge">Source: Local Picks</span>
                <span id="resultCount" class="result-count">0 titles</span>
            </div>
        </section>

        <section class="cards-container" id="cardsContainer"></section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 AniScope. Made by Aryan Barbate.</p>
    </footer>

    <div class="modal" id="animeModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal" aria-label="Close details">&times;</button>

            <div class="modal-poster-wrap">
                <img id="modalImage" alt="Selected anime poster">
            </div>

            <div class="modal-details">
                <div class="modal-badges">
                    <span id="modalGenre" class="genre"></span>
                    <span id="modalSource" class="modal-source">Local pick</span>
                </div>
                <h2 id="modalTitle"></h2>
                <div class="modal-meta" aria-label="Anime metadata">
                    <p><strong>Episodes:</strong> <span id="modalEpisodes">-</span></p>
                    <p><strong>Season:</strong> <span id="modalSeason">-</span></p>
                    <p><strong>Rating:</strong> <span id="modalRating">-</span></p>
                    <p><strong>Genres:</strong> <span id="modalGenres">-</span></p>
                </div>
                <p id="modalDesc"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
